<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GohanZip - Sube y comparte tus archivos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">Gohan<span>Zip</span></h1>
        </div>
    </header>

    <main class="container">
        <div class="upload-card">
            <div class="upload-icon">
                <i class="fas fa-cloud-upload-alt"></i>
            </div>
            <h2>Sube tus archivos</h2>
            <p>Rápido, seguro y fácil como Mediafire.</p>
            
            <div class="upload-area" id="drop-area">
                <input type="file" id="fileElem" hidden>
                <label class="button" for="fileElem">Seleccionar archivos</label>
                <p>o arrastra y suelta aquí</p>
            </div>

            <div id="progress-container" style="display: none;">
                <div class="progress-bar">
                    <div id="progress" style="width: 0%;"></div>
                </div>
                <p id="status-text">Subiendo...</p>
            </div>

            <div id="result-area" style="display: none;">
                <h3>¡Archivo subido con éxito!</h3>
                <div class="link-box">
                    <input type="text" id="share-link" readonly>
                    <button id="copy-btn"><i class="fas fa-copy"></i> Copiar</button>
                </div>
                <button id="upload-more" class="secondary-btn">Subir otro archivo</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 GohanZip - Hecho por WILKER OFC</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
